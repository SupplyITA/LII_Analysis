{% extends "base.html" %}
{% block content %}
<h3>Gold Standard Builder</h3>
<div class="row">
    <div class="col-md-8">
        <!-- form per caricare HTML -->
        <div class="card p-3 mb-3">
            <form id="fetchForm">
                <label>URL Risorsa</label>
                <div class="input-group">
                    <input type="text" id="urlInput" class="form-control" placeholder="https://...">
                    <button type="button" onclick="fetchRawHTML()" class="btn btn-primary">Carica HTML</button>
                </div>
            </form>
        </div>

        <!-- form per salvare GS -->
        <form action="/gs_builder/add" method="POST" class="card p-3">
            <input type="hidden" name="url" id="finalUrl">
            <label>HTML Scaricato (Copia per browser)</label>
            <textarea name="html_text" id="htmlArea" class="form-control mb-3" rows="8" readonly></textarea>
            
            <label>Inserisci Gold Text (Manuale)</label>
            <textarea name="gold_text" class="form-control mb-3" rows="5" placeholder="Incolla qui il testo pulito estratto a mano..."></textarea>
            <button type="submit" class="btn btn-success">Salva nel Database</button>
        </form>
    </div>

    <div class="col-md-4">
        <h6>URL presenti nel GS</h6>
        <form method="GET" class="mb-3">
            <select name="domain" class="form-select" onchange="this.form.submit()">
                <option value="">Seleziona Dominio...</option>
                {% for d in domains %}<option value="{{ d }}" {% if d == selected_domain %}selected{% endif %}>{{ d }}</option>{% endfor %}
            </select>
        </form>
        <ul class="list-group small">
            {% for u in urls_in_gs %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ u[:30] }}...
                <button onclick="deleteUrl('{{ u }}')" class="btn btn-sm btn-danger">X</button>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>

<script>
async function fetchRawHTML() {
    const urlInput = document.getElementById('urlInput');
    const url = urlInput.value;
    
    if (!url) {
        alert("Per favore, inserisci un URL");
        return;
    }

    try {
        const resp = await fetch('/gs_builder/fetch_html', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({'url': url})
        });
        
        const data = await resp.json();
        
        if (data.html_text) {
            document.getElementById('htmlArea').value = data.html_text;
            document.getElementById('finalUrl').value = data.url;
        } else {
            alert(data.error || "Errore durante il recupero dell'HTML");
        }
    } catch (e) {
        alert("Errore di connessione al server: " + e);
    }
}

// Funzione opzionale per cancellare un URL dal GS
async function deleteUrl(url) {
    if (confirm("Sei sicuro di voler eliminare questo Gold Standard?")) {
        const resp = await fetch('/web_resource', { // Corretto per chiamare l'endpoint delete
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 'url': url })
        });
        location.reload(); // ricarica la pagina per aggiornare la lista
    }
}
</script>
{% endblock %}
